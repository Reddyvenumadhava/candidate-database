</head>
<body>

<h1>🚀 User Management App</h1>

<h2>📋 Get Users</h2>
<button onclick="getUsers()">Get Users</button>
<ul id="userList"></ul>

<h2>➕ Add User</h2>
<input type="text" id="name" placeholder="Enter name">
<button onclick="addUser()">Add User</button>

<h2>✏️ Update User</h2>
<input type="text" id="oldName" placeholder="Old name">
<input type="text" id="newName" placeholder="New name">
<button onclick="updateUser()">Update</button>

<h2>❌ Delete User</h2>
<input type="text" id="deleteName" placeholder="Enter name">
<button onclick="deleteUser()">Delete</button>

<hr>

<h1>📄 Resume Parsing</h1>

<input type="file" id="resumeFile">
<button onclick="uploadResume()">Upload Resume</button>

<div id="result"></div>

<script>
const BASE_URL = "https://venu-api-bzhsgremescphybd.centralindia-01.azurewebsites.net";

// ================= USERS =================

async function getUsers() {
    try {
        const res = await fetch(BASE_URL + "/users");
        const data = await res.json();

        let list = document.getElementById("userList");
        list.innerHTML = "";

        data.users.forEach(user => {
            let li = document.createElement("li");
            li.innerText = user;
            list.appendChild(li);
        });
    } catch (error) {
        alert("Error fetching users");
    }
}

async function addUser() {
    let name = document.getElementById("name").value;

    if (!name) {
        alert("Please enter a name");
        return;
    }

    try {
        const res = await fetch(BASE_URL + "/add-user?name=" + encodeURIComponent(name), {
            method: "POST"
        });

        const data = await res.json();
        alert(data.message);

        document.getElementById("name").value = "";
        getUsers();
    } catch (error) {
        alert("Error adding user");
    }
}

async function updateUser() {
    let oldName = document.getElementById("oldName").value;
    let newName = document.getElementById("newName").value;

    if (!oldName || !newName) {
        alert("Enter both names");
        return;
    }

    try {
        const res = await fetch(BASE_URL + `/update-user?old_name=${encodeURIComponent(oldName)}&new_name=${encodeURIComponent(newName)}`, {
            method: "PUT"
        });

        const data = await res.json();
        alert(data.message);

        getUsers();
    } catch (error) {
        alert("Error updating user");
    }
}

async function deleteUser() {
    let name = document.getElementById("deleteName").value;

    if (!name) {
        alert("Enter name");
        return;
    }

    try {
        const res = await fetch(BASE_URL + "/delete-user?name=" + encodeURIComponent(name), {
            method: "DELETE"
        });

        const data = await res.json();
        alert(data.message);

        getUsers();
    } catch (error) {
        alert("Error deleting user");
    }
}

// ================= RESUME PARSING =================

async function uploadResume() {
    let fileInput = document.getElementById("resumeFile");
    let file = fileInput.files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch(BASE_URL + "/parse-resume", {
            method: "POST",
            body: formData
        });

        const data = await res.json();

        document.getElementById("result").innerHTML =
            "<b>Extracted Email:</b> " + data.email;
    } catch (error) {
        alert("Error parsing resume");
    }
}
</script>

</body>
</html>
