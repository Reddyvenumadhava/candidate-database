name: Full Deployment (DB + Backend)

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  # STEP 1: Checkout repo
  - name: Checkout repo
    uses: actions/checkout@v3

  # STEP 2: Install SQLCMD
  - name: Install SQLCMD
    run: |
      sudo apt-get update
      sudo apt-get install -y curl apt-transport-https
      curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
      curl https://packages.microsoft.com/config/ubuntu/20.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
      sudo apt-get update
      sudo ACCEPT_EULA=Y apt-get install -y mssql-tools unixodbc-dev
      echo 'export PATH="$PATH:/opt/mssql-tools/bin"' >> ~/.bashrc

  # STEP 3: Debug (important)
  - name: Debug Files
    run: |
      echo "Listing files in repo:"
      ls -la
      echo "Current directory:"
      pwd
      date

  # STEP 4: Run Schema
  - name: Run Schema
    run: |
      echo "Running Schema Script..."

      if [ -f "V1_SCHEMA.sql" ]; then
        /opt/mssql-tools/bin/sqlcmd \
        -S ${{ secrets.AZURE_SQL_SERVER }} \
        -d ${{ secrets.AZURE_SQL_DB }} \
        -U ${{ secrets.AZURE_SQL_USER }} \
        -P ${{ secrets.AZURE_SQL_PASSWORD }} \
        -i V1_SCHEMA.sql
      else
        echo "ERROR: V1_SCHEMA.sql not found"
        exit 1
      fi

  # STEP 5: Run Seed
  - name: Run Seed
    run: |
      echo "Running Seed Script..."

      if [ -f "V2_seed.sql" ]; then
        /opt/mssql-tools/bin/sqlcmd \
        -S ${{ secrets.AZURE_SQL_SERVER }} \
        -d ${{ secrets.AZURE_SQL_DB }} \
        -U ${{ secrets.AZURE_SQL_USER }} \
        -P ${{ secrets.AZURE_SQL_PASSWORD }} \
        -i V2_seed.sql
      else
        echo "WARNING: V2_seed.sql not found, skipping..."
      fi

  # ===============================
  # BACKEND DEPLOYMENT STARTS HERE
  # ===============================

  # STEP 6: Setup Python
  - name: Set up Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  # STEP 7: Install dependencies
  - name: Install backend dependencies
    run: |
      cd backend
      pip install -r requirements.txt

  # STEP 8: Azure Login
  - name: Azure Login
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.AZURE_CLIENT_ID }}
      tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # STEP 9: Deploy FastAPI to Azure
  - name: Deploy to Azure Web App
    uses: azure/webapps-deploy@v3
    with:
      app-name: venu-api
      package: backend
```
